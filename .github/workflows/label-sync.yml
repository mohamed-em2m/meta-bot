name: Sync Labels

on:
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - ".github/labels.yml"
      - ".github/workflows/label-sync.yml"
  workflow_dispatch:

jobs:
  label-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          token: "${{ secrets.GITHUB_TOKEN }}"
          delete-other-labels: true
